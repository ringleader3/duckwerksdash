<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duckwerks v2</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

<div id="app" x-data>

  <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
  <aside id="sidebar" x-data="sidebar">

    <div class="sidebar-logo">DUCKWERKS</div>

    <!-- Add Item -->
    <button class="btn btn-add" @click="$store.dw.openModal('add')">+ ADD ITEM</button>

    <!-- Quick Find -->
    <div class="sidebar-section">
      <div class="sidebar-section-label">Quick Find</div>
      <div class="sidebar-search">
        <input
          type="text"
          placeholder="/ to search..."
          x-model="query"
          @input="search()"
          @keydown.escape="clear()"
          x-ref="searchInput"
        >
        <div class="search-results" x-show="results.length > 0">
          <template x-for="r in results" :key="r.key">
            <div
              class="search-result-row"
              :class="{ dimmed: r.dimmed }"
              @click="pick(r)"
            >
              <span x-text="r.typeIcon"></span>
              <span x-text="r.label"></span>
              <span x-show="r.badge" class="badge" :class="r.badgeClass" x-text="r.badge"></span>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <div class="sidebar-section">
      <div class="sidebar-section-label">Nav</div>
      <button class="nav-pill" :class="{ active: $store.dw.activeView === 'dashboard' }" @click="$store.dw.activeView = 'dashboard'; $store.dw.categoryFilter = null">◉ Dashboard</button>
      <button class="nav-pill" :class="{ active: $store.dw.activeView === 'items' }"     @click="$store.dw.activeView = 'items'; $store.dw.categoryFilter = null">○ Items</button>
      <button class="nav-pill" :class="{ active: $store.dw.activeView === 'lots' }"      @click="$store.dw.activeView = 'lots'; $store.dw.categoryFilter = null">○ Lots</button>
    </div>

    <!-- Actions -->
    <div class="sidebar-section">
      <div class="sidebar-section-label">Actions</div>
      <a class="sidebar-action" @click="$store.dw.openModal('reverb')">Sync Reverb</a>
    </div>

    <div class="sidebar-spacer"></div>
    <div class="sidebar-version">Duckwerks v2</div>

  </aside>

  <!-- ── Main Content ──────────────────────────────────────────────────────── -->
  <main id="main">

    <!-- Loading -->
    <div class="state-loading" x-show="$store.dw.loading">Loading inventory…</div>

    <!-- Error -->
    <div class="state-error" x-show="$store.dw.error && !$store.dw.loading" x-text="$store.dw.error"></div>

    <!-- Views -->
    <div x-show="!$store.dw.loading && !$store.dw.error">

      <!-- Dashboard -->
      <div x-show="$store.dw.activeView === 'dashboard'" x-data="dashView">
        <div class="view-header">
          <div class="view-title">DASHBOARD</div>
        </div>
        <div class="state-loading" style="color: var(--muted)">Dashboard view — coming in Phase 6</div>
      </div>

      <!-- Items -->
      <div x-show="$store.dw.activeView === 'items'" x-data="itemsView">
        <div class="view-header">
          <div class="view-title">ITEMS</div>
          <div x-show="$store.dw.categoryFilter" style="font-size:12px; color:var(--muted); margin-top:4px">
            Filtered: <span x-text="$store.dw.categoryFilter" style="color:#ccc"></span>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls-row">
          <div class="pill-row">
            <template x-for="s in ['All','Listed','Pending','Sold','Prepping']" :key="s">
              <button class="pill" :class="{ active: statusFilter === s }" @click="statusFilter = s" x-text="s"></button>
            </template>
          </div>
          <div class="pill-row">
            <template x-for="s in ['All','Reverb','eBay']" :key="s">
              <button class="pill" :class="{ active: siteFilter === s }" @click="siteFilter = s" x-text="s"></button>
            </template>
          </div>
          <input class="controls-search" type="text" placeholder="search name..." x-model="nameSearch">
          <button class="btn btn-ghost" x-show="$store.dw.categoryFilter" @click="$store.dw.categoryFilter = null" style="font-size:11px; padding:4px 10px">✕ Category</button>
        </div>

        <!-- Table -->
        <table class="data-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Lot</th>
              <th>Cat</th>
              <th>Site</th>
              <th>Status</th>
              <th class="num">List Price</th>
              <th class="num">EAF Payout</th>
              <th class="num">Est. Profit</th>
              <th class="num">Shipping</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="r in rows" :key="r.id">
              <tr @click="openItem(r)">
                <td x-text="$store.dw.str(r, F.name)"></td>
                <td style="color:var(--muted); font-size:11px" x-text="$store.dw.str(r, F.lot)"></td>
                <td>
                  <span class="badge" :class="catBadgeClass($store.dw.str(r, F.category))" x-text="$store.dw.str(r, F.category)"></span>
                </td>
                <td>
                  <span class="badge" :class="$store.dw.siteLabel(r) === 'eBay' ? 'badge-ebay' : 'badge-reverb'" x-text="$store.dw.siteLabel(r)"></span>
                </td>
                <td style="position:relative">
                  <span class="badge" :class="badgeClass($store.dw.str(r, F.status))" x-text="$store.dw.str(r, F.status)" @click="toggleStatusMenu(r.id, $event)" style="cursor:pointer" title="Click to change status"></span>
                  <div x-show="openStatusId === r.id" class="status-dropdown" @click.stop>
                    <template x-for="s in ['Listed','Pending','Sold','Prepping']" :key="s">
                      <div class="status-option" x-text="s" @click="changeStatus(r, s, $event)"></div>
                    </template>
                  </div>
                </td>
                <td class="num" x-text="$store.dw.num(r, F.listPrice) > 0 ? $store.dw.fmt0($store.dw.num(r, F.listPrice)) : '—'"></td>
                <td class="num est" x-text="eafDisplay(r)"></td>
                <td class="num est" x-text="profitDisplay(r)"></td>
                <td class="num" :class="shipIsEst(r) ? 'est' : 'act'" x-text="shipDisplay(r)"></td>
                <td @click.stop>
                  <div style="display:flex; gap:6px">
                    <button class="btn btn-ghost" style="padding:3px 8px; font-size:11px" @click="$store.dw.openModal('item', r.id)">Edit</button>
                    <button class="btn btn-primary" style="padding:3px 8px; font-size:11px" @click="$store.dw.openModal('label', r.id)">Ship</button>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
        </table>

        <div x-show="rows.length === 0" style="padding:40px; text-align:center; color:var(--muted); font-size:13px">No items match your filters</div>
      </div>

      <!-- Lots -->
      <div x-show="$store.dw.activeView === 'lots'" x-data="lotsView">
        <div class="view-header">
          <div class="view-title">LOTS</div>
        </div>
        <div class="state-loading" style="color: var(--muted)">Lots view — coming in Phase 5</div>
      </div>

    </div>

  </main>

  <!-- ── Modal Containers ──────────────────────────────────────────────────── -->
  <div x-show="$store.dw.activeModal === 'item'"   x-data="itemModal"   class="modal-overlay" @click.self="$store.dw.closeModal()"></div>
  <div x-show="$store.dw.activeModal === 'add'"    x-data="addModal"    class="modal-overlay" @click.self="$store.dw.closeModal()"></div>
  <div x-show="$store.dw.activeModal === 'lot'"    x-data="lotModal"    class="modal-overlay" @click.self="$store.dw.closeModal()"></div>
  <div x-show="$store.dw.activeModal === 'label'"  x-data="labelModal"  class="modal-overlay" @click.self="$store.dw.closeModal()"></div>
  <div x-show="$store.dw.activeModal === 'reverb'" x-data="reverbModal" class="modal-overlay" @click.self="$store.dw.closeModal()"></div>

</div><!-- #app -->

<!-- ── Scripts: load order matters ──────────────────────────────────────── -->
<!-- Config first — defines F, BASE_ID, AIRTABLE_API -->
<script src="js/config.js"></script>

<!-- Alpine store — must register before Alpine initializes -->
<script src="js/store.js"></script>

<!-- Component data definitions -->
<script src="js/sidebar.js"></script>
<script src="js/views/dashboard.js"></script>
<script src="js/views/items.js"></script>
<script src="js/views/lots.js"></script>
<script src="js/modals/item-modal.js"></script>
<script src="js/modals/add-modal.js"></script>
<script src="js/modals/lot-modal.js"></script>
<script src="js/modals/label-modal.js"></script>
<script src="js/modals/reverb-modal.js"></script>

<!-- Alpine last -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

</body>
</html>
