<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duckwerks Dash</title>
  <link rel="icon" type="image/svg+xml" href="/v2/favicon.svg">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

<!-- ── Tape ────────────────────────────────────────────────────────────────── -->
<div class="tape" x-data>
  <div class="tape-brand">
    <svg class="dw-mark" viewBox="100 80 700 570" width="46" height="37" xmlns="http://www.w3.org/2000/svg">
      <path fill="var(--accent)" d="M317.5 609.9 c-54.5 -1.5 -74.1 -3.2 -103.5 -9.4 -27.4 -5.8 -51.2 -17.5 -66 -32.5 -15.1 -15.2 -23.2 -33.9 -26.5 -61.2 -1.7 -13.9 -1.7 -15.2 -0.1 -26.5 5 -34.1 14.6 -55 36.1 -78.1 14.3 -15.3 39.4 -33.5 52.8 -38.2 3.5 -1.2 3.6 -4.9 0.1 -8.7 -5.7 -6.2 -12.4 -17 -18.5 -29.8 l-6.4 -13.6 -4 0.8 c-4.8 1 -22.8 0.6 -30.5 -0.7 -8.2 -1.3 -22.8 -6.9 -26.6 -10.2 -4.9 -4.4 -4.6 -7.1 1.4 -9.6 2.6 -1.1 7 -2.7 9.7 -3.5 8.6 -2.6 23.6 -8.6 26.5 -10.7 3.6 -2.6 5.4 -7.1 4.7 -11.7 -0.5 -3 -2.6 -5.7 -10.5 -13.8 -5.5 -5.5 -11.7 -12.5 -13.9 -15.5 -8.5 -11.9 -16.3 -32.3 -16.3 -42.5 0 -7.8 6 -9.8 14.1 -4.7 2.4 1.6 11.6 6.6 20.4 11.2 8.8 4.6 18 9.4 20.4 10.7 4.1 2.1 4.6 2.2 6.2 0.7 1 -0.9 2.3 -3.3 3 -5.3 1.6 -5.3 11.4 -23.3 16.7 -31 5.5 -8 18.7 -22.9 26.9 -30.2 14.3 -12.9 35.2 -24.8 53.3 -30.3 9 -2.7 33.1 -6.6 40.9 -6.6 5.4 0 31.3 3.5 38 5.2 5.6 1.4 24 8.2 29 10.7 15.5 7.9 29.3 18.1 41.9 30.8 29.2 29.4 43 66.4 40.1 107.3 -1.8 25.6 -12.7 50.4 -30.9 70.5 -2.8 3.1 -4.9 6.2 -4.7 6.8 0.5 1.5 3 2.2 15.2 4.2 5.5 0.9 15 2.6 21 3.8 9.3 1.9 14.5 2.2 33.5 2.2 23.8 0 27 -0.4 37.9 -5.2 3 -1.3 7.3 -3.7 9.5 -5.4 34.8 -25.9 46.1 -34 51.1 -36.7 11.5 -6.1 26.3 5.9 44.8 36.3 9.3 15.3 13.1 25.9 16.1 45 5.3 33.1 0.6 71 -13.2 107 -3.2 8.5 -16.2 34.4 -19.1 38.2 -1.2 1.6 -5.6 7.3 -9.7 12.8 -16.5 21.7 -37.8 39.7 -57.4 48.2 -3 1.4 -7.3 3.3 -9.5 4.3 -8.5 3.9 -33.6 10 -49 11.9 -28.4 3.6 -120.9 5 -195 3z"/>
      <text x="370" y="500" text-anchor="middle" dominant-baseline="middle"
            font-family="'IBM Plex Mono',monospace" font-size="190" font-weight="800"
            fill="#0a0a0a" letter-spacing="0">DW</text>
    </svg>
  </div>
  <div class="tape-live">
    <div class="tape-item">cost
      <b class="dn" x-text="'$' + Alpine.store('dw').records.reduce((s,r)=>s+(r.cost||0),0).toLocaleString('en-US',{maximumFractionDigits:0})"></b>
      <template x-if="Alpine.store('dw').filteredKpis">
        <span class="tape-filtered">· <b x-text="'$' + Alpine.store('dw').filteredKpis.cost.toLocaleString('en-US',{maximumFractionDigits:0})"></b> flt</span>
      </template>
    </div>
    <div class="tape-item">recov
      <b class="up" x-text="'$' + Alpine.store('dw').soldRecords.reduce((s,r)=>s+(r.order?.sale_price||0),0).toLocaleString('en-US',{maximumFractionDigits:0})"></b>
      <template x-if="Alpine.store('dw').filteredKpis">
        <span class="tape-filtered">· <b x-text="'$' + Alpine.store('dw').filteredKpis.revenue.toLocaleString('en-US',{maximumFractionDigits:0})"></b> flt</span>
      </template>
    </div>
    <div class="tape-item">realized
      <b class="up" x-text="(()=>{const p=Alpine.store('dw').soldRecords.reduce((s,r)=>s+(r.order?.profit||0),0);return(p>=0?'+':'')+' $'+Math.abs(p).toLocaleString('en-US',{maximumFractionDigits:0})})()"></b>
      <template x-if="Alpine.store('dw').filteredKpis">
        <span class="tape-filtered">· <b x-text="(Alpine.store('dw').filteredKpis.profit >= 0 ? '+' : '-') + '$' + Math.abs(Alpine.store('dw').filteredKpis.profit).toLocaleString('en-US',{maximumFractionDigits:0})"></b> flt</span>
      </template>
    </div>
    <div class="tape-item">forecast
      <b class="up" x-text="(()=>{const p=Alpine.store('dw').pipeline;return(p>=0?'+':'')+' $'+Math.round(Math.abs(p)).toLocaleString('en-US',{maximumFractionDigits:0})})()"></b>
      <template x-if="Alpine.store('dw').filteredKpis">
        <span class="tape-filtered">· <b x-text="(Alpine.store('dw').filteredKpis.forecast >= 0 ? '+' : '-') + '$' + Math.round(Math.abs(Alpine.store('dw').filteredKpis.forecast)).toLocaleString('en-US',{maximumFractionDigits:0})"></b> flt</span>
      </template>
    </div>
    <div class="tape-item">inv
      <b x-text="Alpine.store('dw').records.length"></b>
      <template x-if="Alpine.store('dw').filteredKpis">
        <span class="tape-filtered">· <b x-text="Alpine.store('dw').filteredKpis.inv"></b> flt</span>
      </template>
    </div>
    <div class="tape-item">listed
      <b x-text="Alpine.store('dw').listedRecords.length"></b>
      <template x-if="Alpine.store('dw').filteredKpis">
        <span class="tape-filtered">· <b x-text="Alpine.store('dw').filteredKpis.listed"></b> flt</span>
      </template>
    </div>
    <div class="tape-item">sold
      <b x-text="Alpine.store('dw').soldRecords.length"></b>
    </div>
  </div>
  <div class="tape-sys">
    <span class="tape-pulse"></span>
    <span x-data x-text="$store.dw.environment || 'local'"></span>
    <span>·</span>
    <span x-text="new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})"></span>
    <button x-data
      @click="$store.dw.orderCount > 0 ? ($store.dw.activeView = 'sites', $store.dw.orderCount = null) : (DwNotifications.requestPermission(), $store.dw.checkOrders())"
      :disabled="$store.dw.checkingOrders"
      style="background:transparent;border:1px solid var(--ink-3);color:var(--ink-2);font:700 9px/1 var(--mono);letter-spacing:.12em;padding:3px 7px;cursor:pointer;margin-left:8px"
      x-text="$store.dw.checkingOrders ? '...' : $store.dw.orderCount > 0 ? $store.dw.orderCount + ' ORDERS' : 'ORDERS'">
    </button>
  </div>
</div>

<div id="app" x-data>

  <!-- ── Rail Nav ───────────────────────────────────────────────────────────── -->
  <aside id="sidebar" x-data="sidebar">
    <button class="rail-link" :class="{ active: $store.dw.activeView === 'dashboard' }"
      @click="$store.dw.activeView = 'dashboard'; $store.dw.categoryFilter = null">
      <span class="gl">◉</span>Home
    </button>
    <button class="rail-link" :class="{ active: $store.dw.activeView === 'items' }"
      @click="$store.dw.activeView = 'items'; $store.dw.categoryFilter = null">
      <span class="gl">▤</span>Inv
    </button>
    <button class="rail-link" :class="{ active: $store.dw.activeView === 'lots' }"
      @click="$store.dw.activeView = 'lots'; $store.dw.categoryFilter = null">
      <span class="gl">▦</span>Lots
    </button>
    <button class="rail-link" :class="{ active: $store.dw.activeView === 'analytics' }"
      @click="$store.dw.activeView = 'analytics'; $store.dw.categoryFilter = null">
      <span class="gl">⎐</span>Anlx
    </button>
    <button class="rail-link" :class="{ active: $store.dw.activeView === 'comps' }"
      @click="$store.dw.activeView = 'comps'; $store.dw.categoryFilter = null">
      <span class="gl">⌕</span>Comp
    </button>
    <button class="rail-link" :class="{ active: $store.dw.activeView === 'catalog' }"
      @click="$store.dw.activeView = 'catalog'; $store.dw.categoryFilter = null">
      <span class="gl">⚌</span>Cat
    </button>
    <button class="rail-link" :class="{ active: $store.dw.activeView === 'sites' }"
      @click="$store.dw.activeView = 'sites'; $store.dw.orderCount = null">
      <span class="gl">⟳</span>Sites
    </button>
    <div class="rail-spacer"></div>
    <button class="rail-link" @click="openSearch()">
      <span class="gl" style="font-size:16px">⌕</span>Srch
    </button>
    <div class="rail-env" x-data
      :style="$store.dw.environment === 'Production' ? 'color:var(--pos)' : 'color:var(--warn)'"
      x-text="$store.dw.environment === 'Production' ? '● PROD' : '● DEV'"></div>
    <div style="text-align:center;padding:6px 4px 10px;font:500 9px/1 var(--mono);letter-spacing:.1em;color:var(--ink-4)" x-data x-text="'v' + APP_VERSION"></div>

    <!-- ── Search overlay ──────────────────────────────────────────────── -->
    <template x-teleport="body">
    <div class="search-overlay" x-show="searching" x-cloak @click.self="closeSearch()" @keydown.escape.window="closeSearch()">
      <div class="search-box">
        <div class="search-input-row">
          <span class="search-icon">⌕</span>
          <input
            x-ref="searchInput"
            type="text"
            x-model="query"
            @input="search()"
            @keydown="navigate($event)"
            @keydown.escape="closeSearch()"
            placeholder="Search items, lots, categories…"
            class="search-input"
            autocomplete="off">
          <span class="search-hint">esc</span>
        </div>
        <div class="search-results" x-ref="searchResults" x-show="results.length">
          <template x-for="(r, i) in results" :key="r.key">
            <div class="search-result" :class="{ active: i === selectedIndex }" @click="pick(r); closeSearch()">
              <span class="search-result-icon" x-text="r.typeIcon"></span>
              <span class="search-result-label" :class="{ dimmed: r.dimmed }" x-text="r.label"></span>
              <span class="search-result-badge badge" :class="r.badgeClass" x-show="r.badge" x-text="r.badge"></span>
            </div>
          </template>
        </div>
        <div class="search-empty" x-show="query.length > 0 && results.length === 0">No matches</div>
      </div>
    </div>
    </template>
  </aside>

  <!-- ── Main Content ──────────────────────────────────────────────────────── -->
  <main id="main">

    <!-- Loading -->
    <div class="state-loading" x-show="$store.dw.loading">Loading inventory…</div>

    <!-- Error -->
    <div class="state-error" x-show="$store.dw.error && !$store.dw.loading" x-text="$store.dw.error"></div>

    <!-- Views -->
    <div x-show="!$store.dw.loading && !$store.dw.error">


  <!-- partial: views/dashboard -->
  <!-- partial: views/items -->
  <!-- partial: views/lots -->
  <!-- partial: views/analytics -->
  <!-- partial: views/comps -->
  <!-- partial: views/catalog -->
  <!-- partial: views/sites -->

      </div>

  </div>

  </main>


  <!-- partial: modals/item -->
  <!-- partial: modals/add -->
  <!-- partial: modals/lot -->
  <!-- partial: modals/label -->
  <!-- partial: modals/shipping -->

</div><!-- #app -->

<!-- ── Scripts: load order matters ──────────────────────────────────────── -->
<!-- Config first — defines APP_VERSION, CAT_COLOR, CAT_BADGE, SITE_FEES -->
<script src="js/config.js"></script>
<script src="js/notifications.js"></script>

<!-- Alpine store — must register before Alpine initializes -->
<script src="js/store.js"></script>

<!-- Component data definitions -->
<script src="js/sidebar.js"></script>
<script src="js/sortable.js"></script>
<script src="js/views/dashboard.js"></script>
<script src="js/views/items.js"></script>
<script src="js/views/lots.js"></script>
<script src="js/views/analytics.js"></script>
<script src="js/views/comps.js"></script>
<script src="js/views/catalog.js"></script>
<script src="js/views/sites.js"></script>
<script src="js/modals/item-modal.js"></script>
<script src="js/modals/add-modal.js"></script>
<script src="js/modals/lot-modal.js"></script>
<script src="js/modals/label-modal.js"></script>
<script src="js/modals/shipping-modal.js"></script>

<!-- Chart.js — non-deferred, before charts.js and before Alpine -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="js/charts.js"></script>

<!-- Toast notification -->
<div id="toast"
     x-data
     x-show="$store.dw.toastMsg"
     :class="{ error: $store.dw.toastType === 'error' }"
     @click="$store.dw.dismissToast()"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0 translate-y-2"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     x-text="$store.dw.toastMsg"
     style="display:none">
</div>

<!-- Alpine last -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

</body>
</html>
