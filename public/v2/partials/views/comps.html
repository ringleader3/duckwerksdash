      <div x-show="$store.dw.activeView === 'comps'" x-data="compsView">
        <div class="hero-band slim">
          <div class="hero-photo"></div>
          <div class="hero-head">
            <div class="hero-crumbs">DW<span class="sep">/</span><b>comps</b></div>
            <div class="hero-tools"></div>
          </div>
        </div>

        <!-- Input panel -->
        <div style="margin-bottom:24px">

          <!-- Column headers -->
          <div style="display:grid; grid-template-columns:1fr 90px 80px 1fr 28px; gap:6px; margin-bottom:4px; padding:0 2px">
            <div style="font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em">Item Name</div>
            <div style="font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em">Source</div>
            <div style="font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em">Min $</div>
            <div style="font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em">Notes</div>
            <div></div>
          </div>

          <!-- Item rows -->
          <template x-for="(item, idx) in items" :key="idx">
            <div style="margin-bottom:8px">
              <div style="display:grid; grid-template-columns:1fr 90px 80px 1fr 28px; gap:6px; margin-bottom:3px">
                <input type="text" x-model="item.name" placeholder="e.g. Fender Stratocaster MIM" :disabled="running"
                       style="background:var(--surface); border:1px solid var(--border); color:var(--white); font-family:'Space Mono',monospace; font-size:12px; padding:6px 8px; border-radius:4px; min-width:0">
                <select x-model="item.sources" :disabled="running"
                        style="background:var(--surface); border:1px solid var(--border); color:var(--white); font-family:'Space Mono',monospace; font-size:12px; padding:6px 4px; border-radius:4px">
                  <option value="ebay">eBay</option>
                  <option value="reverb">Reverb</option>
                  <option value="ebay,reverb">Both</option>
                </select>
                <input type="number" x-model="item.minPrice" placeholder="0" min="0" :disabled="running"
                       style="background:var(--surface); border:1px solid var(--border); color:var(--white); font-family:'Space Mono',monospace; font-size:12px; padding:6px 8px; border-radius:4px; min-width:0">
                <input type="text" x-model="item.notes" placeholder="e.g. no charger, parts only" :disabled="running"
                       style="background:var(--surface); border:1px solid var(--border); color:var(--white); font-family:'Space Mono',monospace; font-size:12px; padding:6px 8px; border-radius:4px; min-width:0">
                <button x-show="items.length > 1" @click="removeItem(idx)" :disabled="running" title="Remove"
                        style="background:none; border:1px solid var(--border); color:var(--muted); border-radius:4px; cursor:pointer; font-size:14px; padding:0; line-height:1">×</button>
                <div x-show="items.length === 1"></div>
              </div>
              <input type="text" x-model="item.searchQuery" placeholder="eBay search query (optional — defaults to item name above)" :disabled="running"
                     style="width:100%; box-sizing:border-box; background:var(--surface); border:1px solid var(--border2); color:var(--muted); font-family:'Space Mono',monospace; font-size:11px; padding:4px 8px; border-radius:4px">
            </div>
          </template>

          <!-- Add row + action buttons -->
          <div style="display:flex; gap:8px; align-items:center; margin-top:10px">
            <button class="btn btn-muted" @click="addItem()" :disabled="running">+ Add Item</button>
            <button class="btn btn-active" @click="run()" :disabled="running || !items.some(i => i.name.trim())">
              <span x-show="!running">Run Comps</span>
              <span x-show="running">Running…</span>
            </button>
            <button class="btn btn-muted" x-show="results.some(r => r.csv)" @click="copyAll(); $el.textContent='✓ Copied'">Copy All CSV</button>
            <button class="btn btn-muted" x-show="results.some(r => r.csv)" @click="downloadAll()">Download All</button>
          </div>

        </div>

        <!-- Results -->
        <template x-for="(result, idx) in results" :key="idx">
          <div style="margin-bottom:32px; border:1px solid var(--border); border-radius:6px; padding:16px">

            <!-- Card header -->
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px">
              <div style="font-size:14px; font-weight:bold; color:var(--white)" x-text="result.name"></div>
              <div style="font-size:11px"
                   :style="result.status === 'done' ? 'color:var(--green)' : result.status === 'error' ? 'color:var(--red)' : 'color:var(--yellow)'"
                   x-text="result.status === 'searching' ? 'Searching…' : result.status === 'analyzing' ? 'Analyzing…' : result.status === 'done' ? 'Done' : 'Error'">
              </div>
            </div>

            <!-- Error -->
            <div x-show="result.status === 'error'" x-text="result.error" style="color:var(--red); font-size:12px; margin-bottom:8px"></div>

            <!-- Analysis paragraph -->
            <div x-show="result.analysis" x-text="result.analysis"
                 style="font-size:12px; color:var(--white); line-height:1.6; margin-bottom:16px; padding:10px; background:rgba(255,255,255,0.04); border-radius:4px">
            </div>

            <!-- CSV table -->
            <div x-show="result.csv">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
                <div style="font-size:11px; color:var(--muted)">Comp table</div>
                <button class="btn btn-muted" style="font-size:11px; padding:3px 8px" @click="copyCSV(result.csv); $el.textContent='✓ Copied'">Copy CSV</button>
                <button class="btn btn-muted" style="font-size:11px; padding:3px 8px; margin-left:4px" @click="downloadTXT(result)">Download</button>
              </div>
              <div style="overflow-x:auto">
                <table class="data-table" style="font-size:11px">
                  <thead>
                    <tr>
                      <th style="text-align:left">Title</th>
                      <th>Cond</th>
                      <th class="num-col sortable" :class="{'sort-active': sortKey==='sold_price'}" @click="sortBy('sold_price')">Sold<span x-text="sortGlyph('sold_price')"></span></th>
                      <th class="num-col">Ship</th>
                      <th class="num-col">Landed</th>
                      <th x-show="showTypeCol">Type</th>
                      <th>Status</th>
                      <th style="text-align:left">Notes</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="(row, ri) in sortedComps(csvRows(result.csv))" :key="ri">
                      <tr>
                        <td x-text="row.title" style="max-width:260px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis"></td>
                        <td x-text="row.condition" style="color:var(--muted)"></td>
                        <td class="num-col" x-text="row.sold_price ? '$' + parseFloat(row.sold_price).toFixed(2) : 'n/a'" style="color:var(--green)"></td>
                        <td class="num-col" x-text="parseFloat(row.shipping) > 0 ? '$' + parseFloat(row.shipping).toFixed(2) : 'Free'" style="color:var(--muted)"></td>
                        <td class="num-col" x-text="row.total_landed ? '$' + parseFloat(row.total_landed).toFixed(2) : 'n/a'" style="color:var(--white); font-weight:bold"></td>
                        <td x-show="showTypeCol" x-text="row.sale_type" style="color:var(--muted)"></td>
                        <td x-text="row.listing_status" :style="row.listing_status === 'sold' ? 'color:var(--green)' : 'color:var(--yellow)'"></td>
                        <td x-text="row.notes" style="color:var(--muted); max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>

          </div>
        </template>

      </div>

    </div>
