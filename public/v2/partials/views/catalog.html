    <!-- ── Catalog Intake View ──────────────────────────────────────────── -->
    <div x-show="$store.dw.activeView === 'catalog'" x-data="catalogView">
      <div class="hero-band slim">
        <div class="hero-photo"></div>
        <div class="hero-head">
          <div class="hero-crumbs">DW<span class="sep">/</span><b>catalog</b></div>
          <div class="hero-tools"></div>
        </div>
      </div>
      <div style="padding:24px; max-width:560px">

      <!-- Toast -->
      <div x-show="toast" x-transition
           :style="toast?.ok ? 'background:var(--green)' : 'background:var(--red)'"
           style="padding:8px 14px; border-radius:4px; margin-bottom:16px; color:#000; font-size:13px; font-weight:bold"
           x-text="toast?.msg"></div>

      <form @submit.prevent="submit" style="display:flex; flex-direction:column; gap:12px">

        <!-- Disc # -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px">DISC #</label>
          <span style="color:var(--yellow); font-family:'Bebas Neue',sans-serif; font-size:22px" x-text="nextDiscNum ?? '…'"></span>
        </div>

        <!-- Box -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">BOX</label>
          <input data-focus type="text" x-model="box" placeholder="e.g. S1"
                 style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:200px">
        </div>

        <!-- Manufacturer typeahead -->
        <div style="display:flex; gap:16px; align-items:flex-start">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0; padding-top:8px">MANUFACTURER</label>
          <div style="position:relative">
            <input type="text" x-model="manufacturerQuery"
                   @input="manufacturerOpen = true; manufacturerIndex = -1"
                   @focus="manufacturerOpen = true"
                   @keydown="mfgKeydown($event)"
                   @keydown.escape="manufacturerOpen = false"
                   placeholder="type to search…"
                   style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:260px">
            <div x-show="manufacturerOpen && mfgFiltered.length > 0" x-cloak
                 @click.outside="manufacturerOpen = false"
                 style="position:absolute; top:100%; left:0; width:260px; background:var(--surface); border:1px solid var(--border); border-top:none; border-radius:0 0 4px 4px; max-height:200px; overflow-y:auto; z-index:50">
              <template x-for="(m, i) in mfgFiltered" :key="m">
                <div @click="selectManufacturer(m)" x-text="m"
                     :style="i === manufacturerIndex ? 'background:var(--border)' : ''"
                     style="padding:6px 10px; font-size:13px; cursor:pointer; color:var(--white)"
                     @mouseenter="manufacturerIndex = i"
                     @mouseleave="manufacturerIndex = -1"></div>
              </template>
            </div>
          </div>
        </div>

        <!-- Mold -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">MOLD</label>
          <select x-model="mold"
                  style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:200px">
            <option value="">— select —</option>
            <template x-for="m in molds" :key="m"><option :value="m" x-text="m"></option></template>
          </select>
          <input type="text" x-model="moldNew" placeholder="or new mold"
                 style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:180px">
        </div>

        <!-- Type -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">TYPE</label>
          <select x-model="type"
                  style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:200px">
            <option value="">— select —</option>
            <template x-for="t in TYPES" :key="t">
              <option :value="t" x-text="t"></option>
            </template>
          </select>
        </div>

        <!-- Plastic -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">PLASTIC</label>
          <select x-model="plastic"
                  style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:200px">
            <option value="">— select —</option>
            <template x-for="p in plastics" :key="p.plastic">
              <option :value="p.plastic" x-text="p.tier === 'Baseline' ? p.plastic + ' (base)' : p.plastic"></option>
            </template>
          </select>
          <input type="text" x-model="plasticNew" placeholder="or new plastic"
                 style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:180px">
        </div>

        <!-- Run/Edition -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">RUN / EDITION</label>
          <input type="text" x-model="run" placeholder="optional"
                 style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:200px">
        </div>

        <!-- Notes -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">NOTES</label>
          <input type="text" x-model="notes" placeholder="optional"
                 style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:200px">
        </div>

        <!-- Condition -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">CONDITION</label>
          <div style="display:flex; gap:0">
            <button type="button" @click="condition = 'NEW'"
                    :style="condition === 'NEW' ? 'background:var(--green); color:#000' : 'background:var(--surface); color:var(--muted)'"
                    style="padding:6px 14px; border:1px solid var(--border); border-radius:4px 0 0 4px; font-family:inherit; font-size:13px; cursor:pointer">NEW</button>
            <button type="button" @click="condition = 'NEW_OTHER'"
                    :style="condition === 'NEW_OTHER' ? 'background:var(--green); color:#000; opacity:0.7' : 'background:var(--surface); color:var(--muted)'"
                    style="padding:6px 14px; border:1px solid var(--border); border-left:none; font-family:inherit; font-size:13px; cursor:pointer">NEW_OTHER</button>
            <button type="button" @click="condition = 'USED'"
                    :style="condition === 'USED' ? 'background:var(--yellow); color:#000' : 'background:var(--surface); color:var(--muted)'"
                    style="padding:6px 14px; border:1px solid var(--border); border-left:none; border-radius:0 4px 4px 0; font-family:inherit; font-size:13px; cursor:pointer">USED</button>
          </div>
        </div>

        <!-- Weight -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">WEIGHT (g)</label>
          <input type="number" x-model.number="weight" min="100" max="200"
                 style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:100px">
        </div>

        <!-- Color -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">COLOR</label>
          <select x-model="color"
                  style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:200px">
            <option value="">— select —</option>
            <template x-for="c in COLORS" :key="c">
              <option :value="c" x-text="c"></option>
            </template>
          </select>
        </div>

        <!-- List Price -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">LIST PRICE ($)</label>
          <input type="number" x-model.number="listPrice" min="0" step="1"
                 style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:100px">
        </div>

        <!-- Flight numbers (auto-populated from lookup, read-only) -->
        <div x-show="flightData" x-cloak style="font-size:11px; color:var(--muted); margin-top:-4px">
          <span style="color:var(--white); letter-spacing:1px">FLIGHT:</span>
          Speed <span x-text="flightData?.speed"></span> &nbsp;|&nbsp;
          Glide <span x-text="flightData?.glide"></span> &nbsp;|&nbsp;
          Turn <span x-text="flightData?.turn"></span> &nbsp;|&nbsp;
          Fade <span x-text="flightData?.fade"></span> &nbsp;|&nbsp;
          Stability <span x-text="flightData?.stability"></span>
        </div>

        <!-- Submit -->
        <div style="margin-top:8px">
          <button type="submit" :disabled="submitting"
                  style="background:var(--blue); color:#fff; border:none; padding:10px 28px; border-radius:4px; font-family:inherit; font-size:14px; letter-spacing:1px; cursor:pointer"
                  x-text="submitting ? 'Saving…' : 'Save Disc'"></button>
        </div>

      </form>

      <!-- ── Inventory ──────────────────────────────────────────────────────── -->
      <div style="margin-top:48px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="modal-section-label">Inventory</div>
          <button @click="inventoryShowSold = !inventoryShowSold; loadInventory()"
            style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:3px 8px;background:transparent;border:1px solid var(--ink-3);color:var(--ink-2);cursor:pointer"
            x-text="inventoryShowSold ? 'HIDE SOLD' : 'SHOW SOLD'"></button>
        </div>
        <div x-show="inventoryLoading" style="color:var(--muted);font-size:11px;letter-spacing:1px">Loading...</div>
        <div x-show="inventoryErr" x-text="inventoryErr" style="color:var(--red);font-size:11px"></div>
        <template x-if="!inventoryLoading && inventory.length === 0">
          <div style="color:var(--muted);font-size:11px">No inventory records.</div>
        </template>
        <template x-if="!inventoryLoading && inventory.length > 0">
          <div>
            <template x-for="row in inventory" :key="row.sku">
              <div style="border-bottom:1px solid var(--border)">

                <!-- Summary row -->
                <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0">
                  <div style="display:flex;gap:16px;align-items:baseline;min-width:0">
                    <span style="font:700 11px/1 var(--mono);flex-shrink:0" x-text="row.sku"></span>
                    <span style="font-size:11px;color:var(--muted);flex-shrink:0" x-text="row.category || '—'"></span>
                    <span style="font-size:11px;color:var(--muted);flex-shrink:0" x-text="row.location || '—'"></span>
                    <span style="font-size:11px;color:var(--muted);flex-shrink:0" x-text="row.metadata?.listPrice ? '$' + row.metadata.listPrice : '—'"></span>
                    <span style="font-size:11px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="inventoryDisplayTitle(row)"></span>
                  </div>
                  <div style="display:flex;gap:6px;flex-shrink:0">
                    <button @click="ebayPreviewDisc(row)"
                      x-show="!ebayPreview[row.sku]"
                      style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:3px 8px;background:transparent;border:1px solid var(--blue);color:var(--blue);cursor:pointer">
                      UPDATE EBAY
                    </button>
                    <button @click="editingSku === row.sku ? cancelEdit() : startEdit(row)"
                      style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:3px 8px;background:transparent;border:1px solid var(--ink-3);color:var(--ink-2);cursor:pointer"
                      x-text="editingSku === row.sku ? '✕ CLOSE' : 'EDIT'"></button>
                  </div>
                </div>

                <!-- eBay preview panel -->
                <template x-if="ebayPreview[row.sku]">
                  <div style="padding:10px 0 14px;border-top:1px solid var(--border)">
                    <template x-if="ebayPreview[row.sku] === 'loading'">
                      <span style="font-size:11px;color:var(--muted);font:700 10px/1 var(--mono);letter-spacing:.08em">FETCHING PREVIEW...</span>
                    </template>
                    <template x-if="ebayPreview[row.sku] !== 'loading'">
                      <div style="display:grid;gap:6px">
                        <template x-if="ebayPreview[row.sku].error">
                          <span style="font-size:11px;color:var(--red)" x-text="ebayPreview[row.sku].error"></span>
                        </template>
                        <template x-if="!ebayPreview[row.sku].error">
                          <div style="display:grid;gap:4px">
                            <div style="font-size:11px"><span style="color:var(--muted);font:700 10px/1 var(--mono)">TITLE </span><span x-text="ebayPreview[row.sku].title"></span></div>
                            <div style="font-size:11px"><span style="color:var(--muted);font:700 10px/1 var(--mono)">PRICE </span><span x-text="'$' + ebayPreview[row.sku].price"></span><span style="color:var(--muted)"> (auto-decline $<span x-text="ebayPreview[row.sku].autoDecline"></span>)</span></div>
                          </div>
                        </template>
                        <template x-if="ebayPreview[row.sku].result">
                          <div style="font-size:11px;padding:4px 0"
                               :style="ebayPreview[row.sku].result === 'updated' ? 'color:var(--green)' : 'color:var(--red)'"
                               x-text="ebayPreview[row.sku].result === 'updated' ? 'POSTED TO EBAY' : ebayPreview[row.sku].result"></div>
                        </template>
                        <div style="display:flex;gap:8px;margin-top:4px">
                          <button @click="ebayConfirmUpdate(row)" :disabled="ebayUpdating[row.sku] || !!ebayPreview[row.sku].error || !!ebayPreview[row.sku].result"
                            style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:4px 14px;background:var(--blue);color:#fff;border:none;cursor:pointer"
                            x-text="ebayUpdating[row.sku] ? 'POSTING TO EBAY...' : 'CONFIRM'"></button>
                          <button @click="ebayCancelPreview(row.sku)"
                            style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:4px 14px;background:transparent;border:1px solid var(--ink-3);color:var(--ink-2);cursor:pointer">
                            CANCEL
                          </button>
                        </div>
                      </div>
                    </template>
                  </div>
                </template>

                <!-- Edit panel -->
                <template x-if="editingSku === row.sku">
                  <div style="padding:12px 0 16px;display:grid;gap:6px">

                    <!-- location (top-level field) -->
                    <div style="display:grid;grid-template-columns:160px 1fr;gap:8px;align-items:center">
                      <span style="font:700 10px/1 var(--mono);letter-spacing:.08em;color:var(--muted)">location</span>
                      <input type="text" x-model="editLocation"
                        style="font-size:12px;padding:3px 6px;border:1px solid var(--border);background:var(--bg);color:var(--ink-1);width:100%"
                        @keydown.escape="cancelEdit()">
                    </div>

                    <!-- metadata k/v pairs -->
                    <template x-for="(pair, idx) in editPairs" :key="idx">
                      <div style="display:grid;grid-template-columns:160px 1fr;gap:8px;align-items:center">
                        <span style="font:700 10px/1 var(--mono);letter-spacing:.08em;color:var(--muted)" x-text="pair.key"></span>
                        <input type="text" x-model="editPairs[idx].value"
                          style="font-size:12px;padding:3px 6px;border:1px solid var(--border);background:var(--bg);color:var(--ink-1);width:100%"
                          @keydown.escape="cancelEdit()">
                      </div>
                    </template>

                    <div style="display:flex;gap:8px;margin-top:4px">
                      <button @click="saveEdit()" :disabled="editSaving"
                        style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:4px 14px;background:var(--blue);color:#fff;border:none;cursor:pointer"
                        x-text="editSaving ? '...' : 'SAVE'"></button>
                      <button @click="cancelEdit()"
                        style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:4px 14px;background:transparent;border:1px solid var(--ink-3);color:var(--ink-2);cursor:pointer">
                        CANCEL
                      </button>
                    </div>
                  </div>
                </template>

              </div>
            </template>
          </div>
        </template>
      </div>

      </div><!-- /catalog padding wrapper -->
    </div>
