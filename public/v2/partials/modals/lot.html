  <div x-show="$store.dw.activeModal === 'lot'" x-data="lotModal" class="modal-overlay" x-cloak>
    <div class="modal-box modal-box-wide" x-show="lot" @keydown.escape.window="$store.dw.activeModal === 'lot' && $store.dw.closeModal()">

      <div class="modal-header" style="flex-wrap:wrap;gap:8px">
        <div x-show="!renaming" class="modal-title" x-text="lot ? lot.name : ''"></div>
        <div x-show="renaming" style="display:flex;gap:6px;align-items:center;flex:1">
          <input x-ref="renameInput" x-model="renameValue" type="text"
            style="background:var(--surface);border:1px solid var(--border2);color:var(--white);font:700 14px/1 var(--mono);padding:4px 8px;flex:1"
            @keydown.enter="saveRename()" @keydown.escape="renaming=false">
          <button class="btn btn-sm" @click="saveRename()" :disabled="renameSaving" x-text="renameSaving ? '…' : 'SAVE'"></button>
          <button class="btn-sm btn-muted" @click="renaming=false">CANCEL</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-left:auto">
          <button class="btn-sm btn-muted" @click="startRename()">RENAME</button>
          <button class="btn-sm btn-muted" @click="addItem()">+ ITEM</button>
          <button class="btn-sm" style="background:var(--red);color:#fff;border:none" @click="confirmDelete()" x-show="items.length === 0">DELETE</button>
          <button class="modal-close" @click="$store.dw.closeModal()">✕</button>
        </div>
      </div>

      <div class="modal-body">

        <!-- Lot stat cards — Cost → Recovered → Realized Profit → Forecasted -->
        <div class="stat-grid" style="margin-bottom:16px">
          <div class="stat-card" :class="totalCost() > 0 ? 'red' : ''">
            <div class="stat-card-label">TOTAL COST</div>
            <div class="stat-card-value" x-text="totalCost() > 0 ? $store.dw.fmt0(totalCost()) : '—'"></div>
            <div class="stat-card-sub">sum of cost basis</div>
          </div>
          <div class="stat-card green">
            <div class="stat-card-label">RECOVERED</div>
            <div class="stat-card-value" x-text="$store.dw.fmt0(recovered())"></div>
            <div class="stat-card-sub">gross sold revenue</div>
          </div>
          <div class="stat-card" :class="realizedProfit() >= 0 ? 'green' : 'red'">
            <div class="stat-card-label">REALIZED PROFIT</div>
            <div class="stat-card-value" x-text="(realizedProfit() >= 0 ? '+' : '') + $store.dw.fmt0(realizedProfit())"></div>
            <div class="stat-card-sub" x-text="totalCost() > 0 ? 'ROI ' + $store.dw.pct(realizedProfit(), totalCost()) + '%' : 'sold after all fees'"></div>
          </div>
          <div class="stat-card" :class="estTotalProfit() >= 0 ? 'green' : 'red'">
            <div class="stat-card-label">FORECASTED PROFIT</div>
            <div class="stat-card-value" x-text="(estTotalProfit() >= 0 ? '+' : '') + $store.dw.fmt0(estTotalProfit())"></div>
            <div class="stat-card-sub" x-text="estUpside() > 0 ? '+' + $store.dw.fmt0(estUpside()) + ' listed est.' : 'realized only'"></div>
          </div>
        </div>

        <!-- Break-even progress bar -->
        <div style="margin-bottom:16px">
          <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:6px">
            <span>RECOVERY PROGRESS</span>
            <span :class="recoveryBarClass()" x-text="recoveryPct() + '%'"></span>
          </div>
          <div class="progress-bar" style="height:10px">
            <div class="progress-fill" :class="recoveryBarClass()" :style="'width:' + recoveryPct() + '%'"></div>
          </div>
          <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:4px">
            <span x-text="countByStatus('Sold') + ' sold · ' + countByStatus('Listed') + ' listed · ' + countByStatus('Prepping') + ' prepping'"></span>
            <span x-text="items.length + ' items total'"></span>
          </div>
        </div>

        <!-- Action row -->
        <div style="display:flex;gap:8px;margin-bottom:16px" x-show="!reallocMode">
          <button class="btn btn-muted" style="font-size:10px;padding:4px 10px" @click="initRealloc()">REALLOCATE COSTS</button>
          <button class="btn btn-muted" style="font-size:10px;padding:4px 10px" @click="exportCsv()">EXPORT CSV</button>
        </div>

        <!-- Item table label -->
        <div class="modal-section-label" style="margin-bottom:8px">Items In Lot</div>

        <!-- Main item table (hidden during realloc) -->
        <table class="data-table" x-show="!reallocMode">
          <thead>
            <tr>
              <th class="sortable" :class="{'sort-active': sortKey==='name'}"      @click="sortBy('name')"      x-text="'Name'       + sortGlyph('name')"></th>
              <th class="sortable" :class="{'sort-active': sortKey==='status'}"    @click="sortBy('status')"    style="white-space:nowrap" x-text="'Status'     + sortGlyph('status')"></th>
              <th class="sortable num-col" :class="{'sort-active': sortKey==='cost'}"      @click="sortBy('cost')"      style="white-space:nowrap" x-text="'Cost'       + sortGlyph('cost')"></th>
              <th class="sortable num-col" :class="{'sort-active': sortKey==='listPrice'}" @click="sortBy('listPrice')" style="white-space:nowrap" x-text="'List'       + sortGlyph('listPrice')"></th>
              <th class="sortable num-col" :class="{'sort-active': sortKey==='eaf'}"       @click="sortBy('eaf')"       style="white-space:nowrap" x-text="'EAF'        + sortGlyph('eaf')"></th>
              <th class="sortable num-col" :class="{'sort-active': sortKey==='estProfit'}" @click="sortBy('estProfit')" style="white-space:nowrap" x-text="'Profit'     + sortGlyph('estProfit')"></th>
              <th class="sortable num-col" :class="{'sort-active': sortKey==='sale'}"      @click="sortBy('sale')"      style="white-space:nowrap" x-text="'Sale'       + sortGlyph('sale')"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="r in sortedItems" :key="r.id">
              <tr class="clickable-row" @click="openItem(r)">
                <td style="text-align:left" x-text="r.name"></td>
                <td><span class="badge" :class="badgeClass(r.status)" x-text="r.status"></span></td>
                <td class="num-col" :class="r.cost > 0 ? 'red' : ''" x-text="r.cost > 0 ? $store.dw.fmt0(r.cost) : '—'"></td>
                <td class="num-col"        x-text="listPriceDisplay(r)"></td>
                <td class="num-col yellow" x-text="eafDisplay(r)"></td>
                <td class="num-col" :class="profitValue(r) >= 0 ? 'green' : 'red'" x-text="profitDisplay(r)"></td>
                <td class="num-col green"  x-text="r.order?.sale_price ? $store.dw.fmt0(r.order.sale_price) : '—'"></td>
              </tr>
            </template>
            <tr x-show="items.length === 0">
              <td colspan="7" style="color:var(--muted); text-align:center">No items in this lot</td>
            </tr>
          </tbody>
        </table>

        <!-- Realloc panel -->
        <div x-show="reallocMode">
          <table class="data-table" style="margin-bottom:12px">
            <thead>
              <tr>
                <th style="text-align:left">Item</th>
                <th>Status</th>
                <th class="num-col">List Price</th>
                <th class="num-col">Cost</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="(row, i) in reallocRows" :key="row.id">
                <tr>
                  <td style="text-align:left" x-text="row.name"></td>
                  <td><span class="badge" :class="badgeClass(row.status)" x-text="row.status"></span></td>
                  <td class="num-col" x-text="row.listPrice > 0 ? '$' + row.listPrice.toFixed(2) : '—'"></td>
                  <td class="num-col">
                    <input type="number" x-model.number="reallocRows[i].editCost" min="0" step="0.01"
                      style="width:80px; background:var(--surface); border:1px solid var(--border2); color:var(--white); font-family:'Space Mono',monospace; font-size:12px; padding:3px 6px; text-align:right">
                  </td>
                </tr>
              </template>
            </tbody>
          </table>

          <!-- Running total -->
          <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-top:1px solid var(--border); margin-bottom:12px">
            <div style="font-size:11px; color:var(--muted); letter-spacing:1px">
              LOT TOTAL: <span style="color:var(--white)" x-text="'$' + reallocOriginalTotal.toFixed(2)"></span>
              &nbsp;&nbsp;
              ALLOCATED: <span :class="reallocColorClass()" x-text="'$' + reallocAllocated().toFixed(2)"></span>
              &nbsp;&nbsp;
              <span :class="reallocColorClass()" x-show="Math.abs(reallocDiff()) >= 0.01"
                x-text="(reallocDiff() > 0 ? '+' : '') + '$' + reallocDiff().toFixed(2)"></span>
              <span class="green" x-show="Math.abs(reallocDiff()) < 0.01">balanced</span>
            </div>
            <div style="display:flex; gap:8px; align-items:center">
              <button class="btn btn-muted" style="font-size:10px; padding:4px 10px" @click="redistribute()" :disabled="reallocSaving">REDISTRIBUTE</button>
              <button class="btn btn-muted" style="font-size:10px; padding:4px 10px" @click="cancelRealloc()" :disabled="reallocSaving">CANCEL</button>
              <button class="btn" style="font-size:10px; padding:4px 10px" @click="saveRealloc()" :disabled="reallocSaving" x-text="reallocSaving ? 'SAVING…' : 'SAVE'"></button>
            </div>
          </div>
          <div x-show="Math.abs(reallocDiff()) >= 0.01" style="font-size:11px; color:var(--yellow); margin-bottom:8px">
            Warning: allocated total doesn't match lot cost.
          </div>
          <div x-show="reallocError" x-text="reallocError" style="font-size:11px; color:var(--red); margin-bottom:8px"></div>
        </div>

      </div><!-- .modal-body -->

    </div>
  </div>
