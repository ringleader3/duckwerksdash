  <!-- ── Modal Containers ──────────────────────────────────────────────────── -->
  <!-- Item Modal -->
  <div x-show="$store.dw.activeModal === 'item'" x-data="itemModal" class="modal-overlay" x-cloak>
    <template x-if="record">
    <div class="modal-box" @keydown.escape.window="$store.dw.closeModal()" @keydown.tab.prevent="$store.dw.trapTab($event, $el)">

      <div class="modal-header">
        <div>
          <div class="modal-title" x-text="record.name"></div>
          <div x-show="itemSku" style="font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:2px" x-text="itemSku"></div>
        </div>
        <button class="modal-close" @click="$store.dw.closeModal()">✕</button>
      </div>

      <div class="modal-body">

        <!-- READ VIEW -->
        <div x-show="!editMode">
          <div class="modal-section-label">Item Details</div>

          <div class="modal-row">
            <span class="modal-field">Status</span>
            <span class="modal-val">
              <span class="badge" :class="badgeClass(record.status)" x-text="record.status || 'n/a'"
                    style="cursor:pointer" title="View all with this status"
                    @click="$store.dw.navToItems(record.status, null)"></span>
            </span>
          </div>
          <div class="modal-row">
            <span class="modal-field">Category</span>
            <span class="modal-val">
              <span class="badge" :class="record.category?.badge_class" x-text="record.category?.name || 'n/a'"
                    style="cursor:pointer" title="View all in this category"
                    @click="$store.dw.navToItems(null, record.category?.name)"></span>
            </span>
          </div>
          <div class="modal-row" x-show="record.listings?.length" style="align-items:flex-start">
            <span class="modal-field" style="padding-top:5px">Listings</span>
            <div style="flex:1; margin-left:16px">
              <table style="width:100%; border-collapse:collapse">
                <template x-for="l in record.listings" :key="l.id">
                  <tr style="border-bottom:1px solid var(--border)">
                    <td style="padding:4px 8px 4px 0; width:1%; white-space:nowrap">
                      <span class="badge" :class="$store.dw.siteBadgeClass(l.site?.name)" x-text="l.site?.name"></span>
                    </td>
                    <td style="padding:4px 8px; width:1%; white-space:nowrap">
                      <span class="badge" :class="listingStatusBadge(l.status)" x-text="l.status"></span>
                    </td>
                    <td style="padding:4px 8px; width:1%; white-space:nowrap; text-align:right; font-size:12px"
                        :style="l.list_price > 0 ? 'color:var(--yellow)' : 'color:var(--muted)'"
                        x-text="l.list_price > 0 ? '$' + l.list_price.toFixed(0) : '—'"></td>
                    <td style="padding:4px 0 4px 6px; font-size:11px; color:var(--muted); text-align:right">
                      <a x-show="listingUrl(l)" :href="listingUrl(l)" target="_blank" style="color:var(--muted)"
                         x-text="l.platform_listing_id ? '↗ #' + l.platform_listing_id : '↗ link'"></a>
                      <span x-show="!listingUrl(l) && !l.platform_listing_id">—</span>
                    </td>
                    <td style="padding:4px 0 4px 6px; text-align:right; width:1%; white-space:nowrap" x-show="l.status === 'active' && !isSold">
                      <template x-if="markSoldId !== l.id">
                        <button class="btn btn-muted" style="font-size:11px; padding:2px 8px"
                                @click="markSold(l.id)">Mark Sold</button>
                      </template>
                      <template x-if="markSoldId === l.id">
                        <div style="display:flex; gap:4px; align-items:center; justify-content:flex-end">
                          <input class="modal-input" type="number" step="0.01" x-model="markSoldPrice"
                                 style="width:70px; padding:2px 6px; font-size:11px" placeholder="Sale $">
                          <button class="btn btn-green" style="font-size:11px; padding:2px 8px"
                                  @click="confirmMarkSold(l.id)">OK</button>
                          <button class="btn btn-muted" style="font-size:11px; padding:2px 8px"
                                  @click="cancelMarkSold()">✕</button>
                        </div>
                      </template>
                    </td>
                  </tr>
                </template>
              </table>
            </div>
          </div>
          <div class="modal-row" x-show="record.lot?.name">
            <span class="modal-field">Lot</span>
            <span class="modal-val" x-text="record.lot?.name"
                  style="cursor:pointer; color:var(--blue)" title="Open lot detail"
                  @click="$store.dw.openModal('lot', null, record.lot?.name)"></span>
          </div>
          <template x-if="record && record.order?.platform_order_num">
            <div>
              <hr class="modal-divider">
              <div class="modal-section-label">Order</div>
              <div class="modal-row" x-data="{ get orderSite() { return record.listings?.find(l => l.status === 'sold')?.site?.name || ''; } }">
                <span class="modal-field" x-text="orderSite"></span>
                <span class="modal-val" style="display:flex; gap:12px; flex-wrap:wrap; justify-content:flex-end">
                  <a x-show="orderSite === 'Reverb'" target="_blank"
                     :href="'https://reverb.com/my/selling/orders/' + record.order?.platform_order_num"
                     style="font-size:11px; color:var(--reverb)"
                     x-text="'↗ Order #' + record.order?.platform_order_num"></a>
                  <a x-show="orderSite === 'Reverb'" target="_blank"
                     :href="'https://reverb.com/my/orders/' + record.order?.platform_order_num + '/packing_slip.pdf'"
                     style="font-size:11px; color:var(--muted)">↗ Packing Slip</a>
                  <a x-show="orderSite === 'eBay'" target="_blank"
                     :href="'https://www.ebay.com/sh/ord/details?orderid=' + record.order?.platform_order_num"
                     style="font-size:11px; color:var(--ebay)">↗ Order Details</a>
                  <a x-show="orderSite === 'eBay'" target="_blank"
                     :href="'https://www.ebay.com/sh/ord/prt?module=PACKING_SLIP_MODULE&orderId=' + record.order?.platform_order_num"
                     style="font-size:11px; color:var(--muted)">↗ Packing Slip</a>
                </span>
              </div>
            </div>
          </template>

          <hr class="modal-divider">
          <div class="modal-section-label">Financials</div>

          <div class="modal-row">
            <span class="modal-field">List Price</span>
            <span class="modal-val" x-text="$store.dw.activeListing(record)?.list_price > 0 ? $store.dw.fmt0($store.dw.activeListing(record).list_price) : 'n/a'"></span>
          </div>
          <div class="modal-row" x-show="$store.dw.activeListing(record)?.list_price > 0 && !isSold">
            <span class="modal-field">Earnings After Fees</span>
            <span class="modal-val est" x-text="$store.dw.fmt0($store.dw.payout(record))"></span>
          </div>
          <div class="modal-row">
            <span class="modal-field">Cost Basis</span>
            <span class="modal-val red" x-text="record.cost > 0 ? $store.dw.fmt0(record.cost) : 'n/a'"></span>
          </div>

          <!-- SOLD state -->
          <template x-if="record && isSold">
            <div>
              <div class="modal-row">
                <span class="modal-field">Actual Payout</span>
                <span class="modal-val green" x-text="$store.dw.fmt0(record.order?.sale_price)"></span>
              </div>
              <div class="modal-row">
                <span class="modal-field">Shipping Cost</span>
                <span class="modal-val red" x-text="$store.dw.fmt0(record.shipment?.shipping_cost ?? record.listings?.find(l => l.status === 'sold')?.shipping_estimate) ?? 'n/a'"></span>
              </div>
              <hr class="modal-divider">
              <div style="display:flex; justify-content:space-between; align-items:flex-end; padding:8px 0">
                <div>
                  <div class="modal-field" style="margin-bottom:6px">Net Profit</div>
                  <div class="modal-big-profit" :class="record.order?.profit >= 0 ? 'green' : 'red'" x-text="(record.order?.profit >= 0 ? '+' : '') + $store.dw.fmt0(record.order?.profit)"></div>
                </div>
                <div style="text-align:right">
                  <div class="modal-field" style="margin-bottom:6px">Margin</div>
                  <div style="font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--muted)"
                       x-text="record.cost > 0 ? Math.round((record.order?.profit / record.cost) * 100) + '%' : 'n/a'"></div>
                </div>
              </div>
            </div>
          </template>

          <!-- LISTED/PENDING state -->
          <template x-if="record && !isSold">
            <div>
              <hr class="modal-divider" x-show="$store.dw.activeListing(record)?.list_price > 0">
              <div class="modal-row" x-show="$store.dw.activeListing(record)?.list_price > 0">
                <span class="modal-field">Shipping</span>
                <span class="modal-val" :class="$store.dw.activeListing(record)?.shipping_estimate != null ? 'red' : 'est'"
                      x-text="$store.dw.activeListing(record)?.shipping_estimate != null ? $store.dw.fmt0($store.dw.activeListing(record).shipping_estimate) : '($7 est)'"></span>
              </div>
              <div style="padding:8px 0" x-show="$store.dw.activeListing(record)?.list_price > 0">
                <div class="modal-field" style="margin-bottom:6px"
                     x-text="record.listings?.filter(l => l.status === 'active').length > 1 ? 'Est. Profit (' + $store.dw.activeListing(record)?.site?.name + ', best net)' : 'Est. Profit'"></div>
                <div class="modal-big-profit est" x-text="$store.dw.fmt0($store.dw.estProfit(record))"></div>
              </div>
            </div>
          </template>

          <hr class="modal-divider">
          <div class="modal-row" style="padding:4px 0">
            <span class="modal-field" style="font-size:11px">Date Added</span>
            <span style="font-size:11px; color:var(--muted)" x-text="record ? new Date(record.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : 'n/a'"></span>
          </div>
          <div class="modal-row" x-show="record.order?.date_sold" style="padding:4px 0">
            <span class="modal-field" style="font-size:11px">Date Sold</span>
            <span style="font-size:11px; color:var(--muted)" x-text="record.order?.date_sold ? new Date(record.order.date_sold + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : ''"></span>
          </div>
          <template x-if="record && (record.shipment?.tracking_id || record.shipment?.tracking_number || record.shipment?.tracker_url)">
            <div>
              <hr class="modal-divider">
              <div class="modal-section-label">Shipment</div>
              <div class="modal-row" x-show="trackingLoading">
                <span style="color:var(--muted);font-size:12px">Loading tracking...</span>
              </div>
              <template x-if="trackingInfo && !trackingLoading">
                <div>
                  <div class="modal-row">
                    <span class="modal-field">Status</span>
                    <span class="modal-val">
                      <span :class="'badge ' + trackStatusBadgeClass" x-text="trackStatusLabel"></span>
                    </span>
                  </div>
                  <div class="modal-row" x-show="trackingInfo.carrier">
                    <span class="modal-field">Carrier</span>
                    <span class="modal-val" style="color:var(--muted)" x-text="trackingInfo.carrier"></span>
                  </div>
                  <div class="modal-row" x-show="trackEstDelivery">
                    <span class="modal-field">Est. Delivery</span>
                    <span class="modal-val" style="color:var(--muted)" x-text="trackEstDelivery"></span>
                  </div>
                  <div class="modal-row" x-show="trackingInfo.publicUrl">
                    <span class="modal-field">Track</span>
                    <span class="modal-val">
                      <a :href="trackingInfo.publicUrl" target="_blank" style="font-size:11px">↗ View Tracker</a>
                    </span>
                  </div>
                  <template x-if="trackingInfo.events && trackingInfo.events.length > 0">
                    <div style="margin-top:8px">
                      <div class="modal-field" style="margin-bottom:6px;font-size:10px">TIMELINE</div>
                      <template x-for="(evt, i) in trackingInfo.events.slice().reverse()" :key="i">
                        <div style="display:flex;gap:8px;align-items:flex-start;padding:4px 0;border-top:1px solid var(--border)">
                          <div style="font-size:10px;color:var(--muted);white-space:nowrap;min-width:60px" x-text="evt.datetime ? new Date(evt.datetime).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : ''"></div>
                          <div style="font-size:11px;color:var(--muted)" x-text="evt.message"></div>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
              <div x-show="!trackingInfo && !trackingLoading">
                <div class="modal-row" x-show="record.shipment?.tracking_number">
                  <span class="modal-field">Tracking #</span>
                  <span class="modal-val" style="color:var(--muted);font-size:12px" x-text="record.shipment?.tracking_number"></span>
                </div>
                <div class="modal-row">
                  <a x-show="record.shipment?.tracker_url" :href="record.shipment?.tracker_url" target="_blank" style="font-size:11px">↗ View Tracker</a>
                  <span x-show="!record.shipment?.tracker_url && !record.shipment?.tracking_number" style="color:var(--muted);font-size:11px">Tracking unavailable</span>
                </div>
              </div>
              <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
                <button @click="clearTracking()" style="padding:4px 10px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer">CLEAR TRACKING</button>
                <button x-show="record.shipment?.label_url" @click="$store.dw.printLabel(record.shipment.label_url)"
                  style="font-size:11px;background:none;border:none;color:var(--blue);cursor:pointer;font-family:'Space Mono',monospace;padding:0">↗ Reprint Label</button>
              </div>
            </div>
          </template>
          <div style="font-size:10px; color:#555; letter-spacing:2px; margin-top:4px" x-text="record ? 'ID: ' + record.id : ''"></div>
        </div>

        <!-- EDIT VIEW -->
        <div x-show="editMode">
          <div class="modal-section-label">Item Details</div>

          <div class="modal-row">
            <span class="modal-field">Name</span>
            <span class="modal-val" style="flex:1; margin-left:16px">
              <input class="modal-input" type="text" x-model="form.name">
            </span>
          </div>
          <div class="modal-row">
            <span class="modal-field">Status</span>
            <span class="modal-val">
              <select class="modal-select" x-model="form.status">
                <template x-for="s in ['Prepping','Listed','Sold']" :key="s">
                  <option :value="s" x-text="s"></option>
                </template>
              </select>
            </span>
          </div>
          <div class="modal-row">
            <span class="modal-field">Category</span>
            <span class="modal-val">
              <select class="modal-select" x-model="form.category">
                <option value="">n/a</option>
                <template x-for="c in $store.dw.categories" :key="c.id">
                  <option :value="c.name" x-text="c.name"></option>
                </template>
              </select>
            </span>
          </div>
          <div class="modal-row">
            <span class="modal-field">Lot</span>
            <span class="modal-val">
              <select class="modal-select" x-model="form.lot">
                <option value="">none</option>
                <template x-for="l in $store.dw.lots" :key="l.name">
                  <option :value="l.name" x-text="l.name"></option>
                </template>
              </select>
            </span>
          </div>

          <hr class="modal-divider">
          <div class="modal-section-label">Listings</div>
          <template x-for="(lf, idx) in form.listings" :key="lf.id || idx">
            <div style="border:1px solid var(--border2); border-radius:4px; padding:10px 12px; margin-bottom:8px">
              <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px">
                <span class="badge" :class="$store.dw.siteBadgeClass(lf.site)" x-text="lf.site"></span>
                <span class="badge badge-other" x-text="lf.status"></span>
              </div>
              <div class="modal-row">
                <span class="modal-field">List Price</span>
                <span class="modal-val"><input class="modal-input" type="number" step="0.01" x-model="lf.list_price" style="width:120px"></span>
              </div>
              <div class="modal-row">
                <span class="modal-field">Shipping Est.</span>
                <span class="modal-val"><input class="modal-input" type="number" step="0.01" x-model="lf.shipping_estimate" style="width:120px"></span>
              </div>
              <div class="modal-row">
                <span class="modal-field">URL</span>
                <span class="modal-val" style="flex:1; margin-left:16px">
                  <input class="modal-input" type="text" x-model="lf.url">
                </span>
              </div>
              <div class="modal-row">
                <span class="modal-field">Listing ID</span>
                <span class="modal-val" style="flex:1; margin-left:16px">
                  <input class="modal-input" type="text" x-model="lf.platform_listing_id">
                </span>
              </div>
            </div>
          </template>
          <template x-for="(pl, idx) in form.pendingListings" :key="idx">
            <div style="border:1px solid var(--border2); border-radius:4px; padding:10px 12px; margin-bottom:8px">
              <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px">
                <span style="font-size:11px; color:var(--muted)">NEW LISTING</span>
                <button class="btn btn-ghost" @click="form.pendingListings.splice(idx, 1)" style="font-size:10px; padding:2px 8px; color:var(--muted)">remove</button>
              </div>
              <div class="modal-row">
                <span class="modal-field">Site</span>
                <span class="modal-val">
                  <select class="modal-select" x-model="pl.site">
                    <option value="">— select —</option>
                    <template x-for="s in $store.dw.sites" :key="s.id">
                      <option :value="s.name" x-text="s.name"></option>
                    </template>
                  </select>
                </span>
              </div>
              <div class="modal-row">
                <span class="modal-field">List Price</span>
                <span class="modal-val"><input class="modal-input" type="number" step="0.01" x-model="pl.list_price" style="width:120px"></span>
              </div>
              <div class="modal-row">
                <span class="modal-field">Shipping Est.</span>
                <span class="modal-val"><input class="modal-input" type="number" step="0.01" x-model="pl.shipping_estimate" style="width:120px"></span>
              </div>
              <div class="modal-row">
                <span class="modal-field">URL</span>
                <span class="modal-val" style="flex:1; margin-left:16px">
                  <input class="modal-input" type="text" x-model="pl.url">
                </span>
              </div>
              <div class="modal-row">
                <span class="modal-field">Listing ID</span>
                <span class="modal-val" style="flex:1; margin-left:16px">
                  <input class="modal-input" type="text" x-model="pl.platform_listing_id">
                </span>
              </div>
            </div>
          </template>
          <div style="margin-top:2px">
            <button class="btn btn-ghost" @click="form.pendingListings.push({ site: '', list_price: '', shipping_estimate: '', url: '', platform_listing_id: '' })" style="font-size:11px; padding:4px 10px">+ ADD LISTING</button>
          </div>

          <hr class="modal-divider">
          <div class="modal-section-label">Financials</div>

          <div class="modal-row">
            <span class="modal-field">Cost Basis</span>
            <span class="modal-val"><input class="modal-input" type="number" step="0.01" x-model="form.cost" style="width:120px"></span>
          </div>
          <div class="modal-row" x-show="record && record.quantity > 1">
            <span class="modal-field">Quantity Available</span>
            <span class="modal-val"><input class="modal-input" type="number" step="1" min="1" x-model.number="form.quantity" style="width:80px"></span>
          </div>
          <div class="modal-row">
            <span class="modal-field">Payout</span>
            <span class="modal-val"><input class="modal-input" type="number" step="0.01" x-model="form.sale" style="width:120px"></span>
          </div>

          <template x-if="form.shipment">
            <div>
              <hr class="modal-divider">
              <div class="modal-section-label">Shipment</div>
              <div class="modal-row">
                <span class="modal-field">Tracker ID</span>
                <span class="modal-val" style="flex:1; margin-left:16px">
                  <input class="modal-input" type="text" x-model="form.shipment.tracking_id" placeholder="trk_...">
                </span>
              </div>
              <div class="modal-row">
                <span class="modal-field">Tracking #</span>
                <span class="modal-val" style="flex:1; margin-left:16px">
                  <input class="modal-input" type="text" x-model="form.shipment.tracking_number">
                </span>
              </div>
              <div class="modal-row">
                <span class="modal-field">Tracker URL</span>
                <span class="modal-val" style="flex:1; margin-left:16px">
                  <input class="modal-input" type="text" x-model="form.shipment.tracker_url">
                </span>
              </div>
              <div class="modal-row">
                <span class="modal-field">Ship Cost</span>
                <span class="modal-val"><input class="modal-input" type="number" step="0.01" x-model="form.shipment.shipping_cost" style="width:120px"></span>
              </div>
            </div>
          </template>

        </div>

      </div><!-- .modal-body -->

      <div class="modal-footer">
        <button class="btn btn-ghost" x-show="editMode" @click="cancelEdit()">CANCEL</button>
        <button class="btn btn-save"  x-show="editMode" @click="save()" :disabled="saving" x-text="saving ? 'SAVING...' : 'SAVE'"></button>
        <span class="save-msg" x-show="editMode" :class="saveMsg.startsWith('ERROR') ? 'error' : ''" x-text="saveMsg"></span>
        <button class="btn btn-ghost" x-show="!editMode" @click="startEdit()">EDIT</button>
        <button class="btn btn-primary" x-show="!editMode" @click="$store.dw.openModal('label', record.id)">SHIP</button>
        <button class="btn btn-ghost" x-show="!editMode" style="margin-left:auto"
          @click="if(confirm('Delete this item and all associated listings/orders/shipments?')) { $store.dw.deleteItem(record.id); $store.dw.closeModal(); }">
          DELETE
        </button>
      </div>

    </div>
    </template>
  </div>

  <!-- Add Modal -->
