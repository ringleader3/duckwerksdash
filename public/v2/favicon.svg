<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0f0f0f"/>

  <!-- Devil horns -->
  <polygon points="10,10 8,4 13,9" fill="#c0392b"/>
  <polygon points="22,10 24,4 19,9" fill="#c0392b"/>

  <!-- Duck body -->
